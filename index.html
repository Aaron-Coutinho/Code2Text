<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Context Consolidator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-gradients">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header>
            <h1>Context Consolidator</h1>
            <p>Turn your project into a single AI-ready text file.</p>
        </header>

        <main>
            <div id="drop-zone" class="drop-zone">
                <div class="icon-container">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
                    </svg>
                </div>
                <h3>Drag & Drop your Project Folder here</h3>
                <p class="sub-text">or click to browse</p>
                <input type="file" id="folder-input" webkitdirectory directory multiple>
            </div>

            <div id="processing-view" class="hidden">
                 <div class="loader"></div>
                 <p>Scanning files...</p>
            </div>

            <div id="result-view" class="hidden">
                <div class="stats-bar">
                    <span id="file-count">0 files selected</span>
                    <span id="total-size">0 MB</span>
                </div>
                
                <div class="file-list-container">
                    <div class="file-list-header">
                        <label class="checkbox-container">
                            <input type="checkbox" id="select-all" checked>
                            <span class="checkmark"></span>
                            Select All
                        </label>
                        <span class="search-icon">🔍</span>
                    </div>
                    <ul id="file-list">
                        <!-- File items will be injected here -->
                    </ul>
                </div>

                <div class="actions">
                    <button id="download-btn" class="btn primary-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="btn-icon">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />
                        </svg>
                        Download Context File
                    </button>
                    <button id="reset-btn" class="btn secondary-btn">Reset</button>
                </div>
            </div>
        </main>

        <footer>
            <p>100% Client-side. No files are uploaded.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
